    <text x="0" y="12" font-size="10" fill="#94a3b8">图例:</text>
    <rect x="40" y="2" width="10" height="10" rx="2" fill="url(#layer1)"/>
    <text x="55" y="12" font-size="10" fill="#64748b">用户</text>
    <rect x="90" y="2" width="10" height="10" rx="2" fill="url(#layer2)"/>
    <text x="105" y="12" font-size="10" fill="#64748b">接入</text>
    <rect x="140" y="2" width="10" height="10" rx="2" fill="url(#layer3)"/>
    <text x="155" y="12" font-size="10" fill="#64748b">服务</text>
