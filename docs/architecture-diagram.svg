    <text x="706" y="632" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">📊 bnc / frq / exchange</text>
    <text x="706" y="647" text-anchor="middle" font-size="10" fill="#64748b">词频 · 变形</text>
  </g>

