    <text x="150" y="387" text-anchor="middle" font-size="10" fill="#64748b">POST · 图片OCR识别</text>
  </g>
  <g filter="url(#shadowLight)">
    <rect x="255" y="358" width="180" height="36" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="345" y="372" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">/export/generate</text>
    <text x="345" y="387" text-anchor="middle" font-size="10" fill="#64748b">POST · 9种格式导出</text>
  </g>
  <g filter="url(#shadowLight)">
