  </g>
  <g filter="url(#shadowLight)">
    <rect x="490" y="248" width="200" height="26" rx="6" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="590" y="266" text-anchor="middle" font-size="11" fill="#3730a3">📁 静态文件服务 (exports/)</text>
  </g>

