    <text x="50" y="349" font-size="11" fill="#64748b">Python FastAPI · Uvicorn ASGI · RESTful API</text>
  </g>
  <g filter="url(#shadowLight)">
    <rect x="60" y="358" width="180" height="36" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
