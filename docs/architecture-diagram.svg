    <text x="265" y="763" text-anchor="middle" font-size="11" fill="#9d174d">CSV · Anki</text>
  </g>
  <g filter="url(#shadowLight)">
    <rect x="340" y="742" width="130" height="34" rx="6" fill="#fdf2f8" stroke="#fbcfe8" stroke-width="1"/>
    <text x="405" y="763" text-anchor="middle" font-size="11" fill="#9d174d">TXT · 墨墨/不背</text>
  </g>
  <g filter="url(#shadowLight)">
    <rect x="480" y="742" width="130" height="34" rx="6" fill="#fdf2f8" stroke="#fbcfe8" stroke-width="1"/>
    <text x="545" y="763" text-anchor="middle" font-size="11" fill="#9d174d">XML · 欧路/有道</text>
  </g>
  <g filter="url(#shadowLight)">
    <rect x="620" y="742" width="130" height="34" rx="6" fill="#fdf2f8" stroke="#fbcfe8" stroke-width="1"/>
    <text x="685" y="763" text-anchor="middle" font-size="11" fill="#9d174d">TXT · 百词斩</text>
