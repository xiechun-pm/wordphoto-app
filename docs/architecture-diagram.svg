<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" width="960" height="820" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="layer5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="layer6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="820" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">拍照识词导出助手 — 产品技术架构图</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">WordPhoto Export Assistant — System Architecture</text>

  <!-- ====== Layer 1: 用户层 ====== -->
  <g filter="url(#shadow)">
    <rect x="30" y="80" width="900" height="95" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.5"/>
    <rect x="30" y="80" width="6" height="95" rx="3" fill="url(#layer1)"/>
    <text x="50" y="102" font-size="14" font-weight="700" fill="#1e40af">用户层 User Layer</text>
    <text x="50" y="120" font-size="11" fill="#64748b">微信小程序客户端 · 原生框架 · iOS / Android</text>
  </g>
  <!-- Layer 1 sub-boxes -->
  <g filter="url(#shadowLight)">
    <rect x="60" y="128" width="130" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="125" y="150" text-anchor="middle" font-size="12" fill="#1e40af">📷 拍照识别</text>
  </g>
  <g filter="url(#shadowLight)">
    <rect x="202" y="128" width="130" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="267" y="150" text-anchor="middle" font-size="12" fill="#1e40af">🖼️ 相册选择</text>
  </g>
  <g filter="url(#shadowLight)">
    <rect x="344" y="128" width="150" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="419" y="150" text-anchor="middle" font-size="12" fill="#1e40af">📋 结果展示与编辑</text>
  </g>
  <g filter="url(#shadowLight)">
    <rect x="506" y="128" width="130" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="571" y="150" text-anchor="middle" font-size="12" fill="#1e40af">📦 多格式导出</text>
  </g>
  <g filter="url(#shadowLight)">
    <rect x="648" y="128" width="130" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="713" y="150" text-anchor="middle" font-size="12" fill="#1e40af">🔗 下载链接</text>
  </g>

